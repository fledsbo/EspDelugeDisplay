[env:esp32s3]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

board_upload.flash_size = 16MB
board_build.partitions = partitions.csv
board_build.arduino.memory_type = qio_opi
upload_speed = 921600

extra_scripts = pre:load_env.py
test_ignore = test_native
test_build_src = false

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -I src

[env:native_test]
platform = native
build_flags = -I test/test_native -I src -DUNIT_TEST
build_src_filter = +<../src/deluge_sysex.cpp>
lib_deps = throwtheswitch/Unity@^2.6
test_ignore = test_embedded
; Requires gcc on PATH — install MinGW or MSYS2 on Windows
; Run with: pio test -e native_test
